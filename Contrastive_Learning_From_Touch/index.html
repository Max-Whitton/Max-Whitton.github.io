<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Making Sense of Touch from the Child’s View for Contrastive Learning</title>

<style>
:root {
    --primary: #2c3e50;
    --accent: #3498db;
    --text: #333;
    --bg: #f9f9f9;
    --card: #ffffff;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

section {
    background: var(--card);
    padding: 30px;
    margin-bottom: 25px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

h2 {
    margin-top: 0;
    color: var(--primary);
    border-bottom: 2px solid var(--accent);
    padding-bottom: 8px;
}

/* ===== HEADER ===== */
header {
    background: var(--card);
    padding: 50px 20px;
    border-bottom: 1px solid #eee;
}

.header-content {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
}



.header-text h1 {
    margin: 0;
    font-size: 2.4rem;
    color: var(--primary);
}

.subtitle {
    font-size: 1.1rem;
    color: #666;
    margin: 8px 0;
}

.contact {
    font-size: 0.95rem;
}

.contact a {
    color: var(--accent);
    text-decoration: none;
    margin-right: 15px;
}




<script>
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });

    document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}
</script>

</body>
</html>
